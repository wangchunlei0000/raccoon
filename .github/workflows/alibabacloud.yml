name: Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3  

      - name: Install Deps
        run: npm i

      # build
      - name: Build 🔧
        run:  npm run buildci     

      - name: Deploy 🚀
        uses: JamesIves/Github-pages-deploy-action@releases/v4
        with:
          folder: dist
