name: Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
         
      - name: Install PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ^7.0

      - name: Install Deps
        run: pnpm i

      # build
      - name: Build- 🔧
        run:  pnpm run buildci     

      - name: Deploy 🚀
        uses: JamesIves/Github-pages-deploy-action@releases/v4
        with:
          folder: dist
